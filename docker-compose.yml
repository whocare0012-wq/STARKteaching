services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stark-teaching-app
    ports:
      - "3300:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: Asia/Shanghai
      FRONTEND_URL: http://localhost:3300
      JWT_SECRET: ${JWT_SECRET:-replace-this-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
    volumes:
      - stark_app_storage:/app/storage
    shm_size: "1gb"
    restart: unless-stopped

volumes:
  stark_app_storage:
